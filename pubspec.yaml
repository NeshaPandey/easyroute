name: easyroute
description: EasyRoute – AI Smart Navigation Assistant for everyone.
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  provider: ^6.1.1

  # Navigation
  go_router: ^12.1.1

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  google_sign_in: ^6.1.6

  # Maps
  google_maps_flutter: ^2.5.3
  flutter_polyline_points: ^2.0.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  location: ^5.0.3

  # HTTP & APIs
  http: ^1.1.0
  dio: ^5.4.0

  # Voice & Speech
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_animate: ^4.3.0
  percent_indicator: ^4.2.3
  sliding_up_panel: ^2.0.0+1
  smooth_page_indicator: ^1.1.0

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0
  connectivity_plus: ^5.0.2
  uuid: ^4.2.2
  logger: ^2.0.2+1
  get_it: ^7.6.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mockito: ^5.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
